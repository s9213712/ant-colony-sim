name: validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Python syntax check
        run: |
          python -m py_compile \
            behavior_probe.py \
            experiments/actual_biology_simulation.py \
            experiments/actual_biology_sensitivity.py \
            experiments/batch_runner.py \
            experiments/build_literature_corpus.py \
            experiments/check_validation_boundaries.py \
            experiments/calibrate_double_bridge.py \
            experiments/calibrate_foraging.py \
            experiments/digitized_curve_inventory.py \
            experiments/double_bridge_probe.py \
            experiments/evaluate_literature_corpus.py \
            experiments/fit_individual_response_curve.py \
            experiments/generate_literature_gap_backlog.py \
            experiments/generate_validation_report.py \
            experiments/level5_uncertainty_audit.py \
            experiments/level5_replicate_statistics.py \
            experiments/literature_calibration_cycle.py \
            experiments/literature_alignment_probe.py \
            experiments/paper_conditions_probe.py \
            experiments/performance_probe.py \
            experiments/qa_report_probe.py \
            experiments/quantitative_readiness_audit.py \
            experiments/stochasticity_probe.py \
            experiments/summarize_batch.py \
            experiments/validate_traffic_holdout.py

      - name: Validation boundary check
        run: python experiments/check_validation_boundaries.py

      - name: Start local simulation server
        run: |
          python -m http.server 8876 --bind 127.0.0.1 --directory . >/tmp/ant_colony_sim_server.log 2>&1 &
          echo $! > /tmp/ant_colony_sim_server.pid
          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:8876/ >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/ant_colony_sim_server.log
          exit 1

      - name: Script API and UI QA
        run: python experiments/qa_report_probe.py

      - name: Actual biology smoke probe
        run: |
          python experiments/actual_biology_simulation.py \
            --quick \
            --output outputs/ci_actual_biology_smoke.csv \
            --json-output outputs/ci_actual_biology_smoke.json \
            --report-output outputs/ci_actual_biology_smoke.md

      - name: Actual biology sensitivity smoke probe
        run: |
          python experiments/actual_biology_sensitivity.py \
            --quick \
            --output outputs/ci_actual_biology_sensitivity_smoke.csv \
            --effects-output outputs/ci_actual_biology_sensitivity_smoke_effects.csv \
            --json-output outputs/ci_actual_biology_sensitivity_smoke.json \
            --report-output outputs/ci_actual_biology_sensitivity_smoke.md

      - name: Literature calibration cycle
        run: |
          python experiments/literature_calibration_cycle.py \
            --targets targets/literature_pheromone_constraints.json \
            --effects outputs/actual_biology_sensitivity_effects.csv \
            --csv-output outputs/ci_literature_calibration_cycle.csv \
            --json-output outputs/ci_literature_calibration_cycle.json \
            --report-output outputs/ci_literature_calibration_cycle.md \
            --fail-on-issues

      - name: Quantitative readiness audit
        run: |
          python experiments/quantitative_readiness_audit.py \
            --targets targets/quantitative_curve_targets.json \
            --csv-output outputs/ci_quantitative_readiness_audit.csv \
            --json-output outputs/ci_quantitative_readiness_audit.json \
            --report-output outputs/ci_quantitative_readiness_audit.md

      - name: Digitized curve inventory
        run: |
          python experiments/digitized_curve_inventory.py \
            --csv-output outputs/ci_digitized_curve_inventory.csv \
            --json-output outputs/ci_digitized_curve_inventory.json \
            --report-output outputs/ci_digitized_curve_inventory.md

      - name: Individual pheromone response fit
        run: |
          python experiments/fit_individual_response_curve.py \
            --csv-output outputs/ci_individual_response_curve_fit.csv \
            --json-output outputs/ci_individual_response_curve_fit.json \
            --report-output outputs/ci_individual_response_curve_fit.md \
            --fail-on-issues

      - name: Traffic holdout validation
        run: |
          python experiments/validate_traffic_holdout.py \
            --csv-output outputs/ci_traffic_holdout_validation.csv \
            --json-output outputs/ci_traffic_holdout_validation.json \
            --report-output outputs/ci_traffic_holdout_validation.md \
            --fail-on-issues

      - name: Literature alignment probe
        run: python experiments/literature_alignment_probe.py

      - name: Paper-condition smoke probe
        run: |
          python experiments/paper_conditions_probe.py \
            --quick \
            --seeds 1-2 \
            --output outputs/ci_paper_conditions_smoke.csv \
            --json-output outputs/ci_paper_conditions_smoke.json \
            --report-output outputs/ci_paper_conditions_smoke.md

      - name: Level 5 replicate statistics
        run: |
          python experiments/level5_replicate_statistics.py \
            --paper-conditions outputs/ci_paper_conditions_smoke.json \
            --csv-output outputs/ci_level5_replicate_statistics.csv \
            --json-output outputs/ci_level5_replicate_statistics.json \
            --report-output outputs/ci_level5_replicate_statistics.md \
            --min-n 2 \
            --fail-on-underpowered

      - name: Level 5 uncertainty audit
        run: |
          python experiments/level5_uncertainty_audit.py \
            --individual-fit outputs/ci_individual_response_curve_fit.json \
            --traffic-holdout outputs/ci_traffic_holdout_validation.json \
            --replicate-statistics outputs/ci_level5_replicate_statistics.json \
            --csv-output outputs/ci_level5_uncertainty_audit.csv \
            --json-output outputs/ci_level5_uncertainty_audit.json \
            --report-output outputs/ci_level5_uncertainty_audit.md \
            --fail-on-regression

      - name: Stochasticity smoke probe
        run: |
          python experiments/stochasticity_probe.py \
            --seeds 1-2 \
            --pre-days 1 \
            --post-days 1 \
            --adaptation-days 0.25 \
            --profiles low,medium,high,diverse \
            --output outputs/ci_stochasticity_smoke.csv

      - name: Generate validation report
        run: |
          python experiments/generate_validation_report.py \
            --stochasticity-csv outputs/ci_stochasticity_smoke.csv \
            --output outputs/ci_biological_validation_report.md

      - name: Upload validation outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-outputs
          path: |
            outputs/ci_stochasticity_smoke.csv
            outputs/ci_stochasticity_smoke.json
            outputs/ci_stochasticity_smoke_summary.csv
            outputs/ci_actual_biology_smoke.csv
            outputs/ci_actual_biology_smoke.json
            outputs/ci_actual_biology_smoke.md
            outputs/ci_actual_biology_sensitivity_smoke.csv
            outputs/ci_actual_biology_sensitivity_smoke_effects.csv
            outputs/ci_actual_biology_sensitivity_smoke.json
            outputs/ci_actual_biology_sensitivity_smoke.md
            outputs/ci_literature_calibration_cycle.csv
            outputs/ci_literature_calibration_cycle.json
            outputs/ci_literature_calibration_cycle.md
            outputs/ci_quantitative_readiness_audit.csv
            outputs/ci_quantitative_readiness_audit.json
            outputs/ci_quantitative_readiness_audit.md
            outputs/ci_digitized_curve_inventory.csv
            outputs/ci_digitized_curve_inventory.json
            outputs/ci_digitized_curve_inventory.md
            outputs/ci_individual_response_curve_fit.csv
            outputs/ci_individual_response_curve_fit.json
            outputs/ci_individual_response_curve_fit.md
            outputs/ci_traffic_holdout_validation.csv
            outputs/ci_traffic_holdout_validation.json
            outputs/ci_traffic_holdout_validation.md
            outputs/ci_level5_uncertainty_audit.csv
            outputs/ci_level5_uncertainty_audit.json
            outputs/ci_level5_uncertainty_audit.md
            outputs/ci_paper_conditions_smoke.csv
            outputs/ci_paper_conditions_smoke.json
            outputs/ci_paper_conditions_smoke.md
            outputs/ci_level5_replicate_statistics.csv
            outputs/ci_level5_replicate_statistics.json
            outputs/ci_level5_replicate_statistics.md
            outputs/ci_biological_validation_report.md
            outputs/ci_biological_validation_report.json
